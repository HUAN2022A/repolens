name: Bug report
description: Report something that is not working as expected
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the command you ran and a minimal repository shape if possible.
      placeholder: |
        1. Run `repolens ...`
        2. Open `.repolens/...`
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS / Linux / Windows"
