name: Feature request
description: Suggest an improvement for RepoLens
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or agent workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should RepoLens do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Scanning
        - Relevance ranking
        - Output format
        - MCP / integrations
        - Documentation
    validations:
      required: true
